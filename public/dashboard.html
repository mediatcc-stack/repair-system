<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แดชบอร์ดผู้ดูแลระบบและเจ้าหน้าที่</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen">

    <nav class="bg-white shadow-sm border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-slate-900 flex items-center gap-2">
            🛠️ Technician Dashboard 
        </h1>
        <div class="flex items-center gap-2">
            <a href="/index.html" class="text-sm bg-slate-200 hover:bg-slate-300 px-4 py-2 rounded-lg transition font-medium">
                ← กลับหน้าไปแจ้งซ่อม
            </a>
            <button onclick="checkAdminPassword()" class="text-sm bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition font-medium cursor-pointer flex items-center gap-1">
                👑 เจ้าหน้าที่
            </button>
        </div>
    </div>
</nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden">
            <div class="p-6 border-b border-slate-200 bg-slate-50">
                <h2 class="font-bold text-lg text-slate-800">รายการแจ้งซ่อมทั้งหมดในระบบ</h2>
                <p class="text-xs text-slate-500">ช่างสามารถดูรายละเอียด ตรวจสอบความเร่งด่วน และกดยอมรับหรือเปลี่ยนสถานะงานได้ที่นี่</p>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100 text-slate-600 uppercase text-xs tracking-wider border-b border-slate-200">
                            <th class="py-3.5 px-6 font-semibold">ID</th>
                            <th class="py-3.5 px-6 font-semibold">ผู้แจ้ง/แผนก</th>
                            <th class="py-3.5 px-6 font-semibold">ประเภทปัญหา</th>
                            <th class="py-3.5 px-6 font-semibold">รายละเอียดอาการ</th>
                            <th class="py-3.5 px-6 font-semibold">ความเร่งด่วน</th>
                            <th class="py-3.5 px-6 font-semibold">สถานะงาน</th>
                        </tr>
                    </thead>
                    <tbody id="ticketList" class="divide-y divide-slate-200 text-sm">
                        <tr>
                            <td colspan="6" class="text-center py-8 text-slate-400">กำลังโหลดข้อมูลข้อมูล...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // ฟังก์ชันดึงข้อมูลจาก API มาแสดงในตาราง
        async function fetchTickets() {
            try {
                const response = await fetch('/api/repairs');
                const tickets = await response.json();
                
                const tbody = document.getElementById('ticketList');
                tbody.innerHTML = ''; // ล้างข้อมูลเดิมก่อนโหลดใหม่

                if (tickets.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-slate-400">ยังไม่มีรายการแจ้งซ่อมในระบบ</td></tr>`;
                    return;
                }

                tickets.forEach(ticket => {
                    // ปรับสี Badge ตามความเร่งด่วน
                    let priorityColor = 'bg-slate-100 text-slate-700';
                    if (ticket.priority === 'ด่วน') priorityColor = 'bg-amber-100 text-amber-700';
                    if (ticket.priority === 'ด่วนที่สุด') priorityColor = 'bg-red-100 text-red-700 font-bold';

                    let statusStyle = 'bg-slate-100 text-slate-600';
if (ticket.status === 'รอดำเนินการ') statusStyle = 'bg-amber-50 text-amber-600 border border-amber-200';
if (ticket.status === 'กำลังซ่อม') statusStyle = 'bg-blue-50 text-blue-600 border border-blue-200';
if (ticket.status === 'ซ่อมเสร็จสิ้น') statusStyle = 'bg-green-50 text-green-600 border border-green-200';

const row = document.createElement('tr');
row.className = 'hover:bg-slate-50 transition';
row.innerHTML = `
    <td class="py-4 px-6 font-semibold text-slate-500">#${ticket.id}</td>
    <td class="py-4 px-6">
        <div class="font-medium text-slate-900">${ticket.requester_name}</div>
        <div class="text-xs text-slate-400">แผนก :${ticket.department}</div>
        <div class="text-xs text-indigo-500 font-medium">📍 ห้อง: ${ticket.room_name || 'ไม่ได้ระบุ'}</div>
    </td>
    <td class="py-4 px-6 text-slate-600">${ticket.problem_type}</td>
    <td class="py-4 px-6 text-slate-600 max-w-xs truncate" title="${ticket.description}">${ticket.description}</td>
    <td class="py-4 px-6">
        <span class="px-2.5 py-1 rounded-full text-xs font-medium ${priorityColor}">${ticket.priority}</span>
    </td>
    <td class="py-4 px-6">
        <span class="px-3 py-1.5 rounded-lg text-xs font-semibold ${statusStyle}">
            ${ticket.status === 'รอดำเนินการ' ? '⏳ ' : ticket.status === 'กำลังซ่อม' ? '⚙️ ' : '✅ '} ${ticket.status}
        </span>
    </td>
`;
tbody.appendChild(row);
                });
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // ฟังก์ชันสั่งอัปเดตสถานะเมื่อช่างเลือกเปลี่ยนค่าใน Select Box
        async function updateStatus(id, newStatus) {
            try {
                const response = await fetch(`/api/repair/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                const result = await response.json();
                if (result.success) {
                    console.log(`เคส #${id} ถูกเปลี่ยนสถานะเป็น: ${newStatus}`);
                } else {
                    alert('ไม่สามารถอัปเดตสถานะได้: ' + result.message);
                }
            } catch (error) {
                console.error(error);
                alert('เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์');
            }
        }

        // โหลดข้อมูลทันทีเมื่อเปิดหน้าเว็บ
        fetchTickets();
        
        // ให้หน้าเว็บทำการดึงข้อมูลใหม่ทุกๆ 10 วินาทีแบบ Real-time เผื่อมีเคสใหม่เด้งเข้ามา
        setInterval(fetchTickets, 10000);
  
        // ฟังก์ชันสำหรับตรวจสอบรหัสผ่านแอดมินก่อนเปลี่ยนหน้า
function checkAdminPassword() {
    const password = prompt("🔒 กรุณากรอกรหัสผ่านสำหรับผู้ดูแลระบบ (Admin):");
    
    // ตรวจสอบรหัสผ่านที่ตั้งไว้
    if (password === "media@2021") {
        alert("🔓 รหัสผ่านถูกต้อง กำลังนำคุณเข้าสู่หน้าแอดมิน...");
        window.location.href = "/admin.html"; // ย้ายหน้าไป admin
    } else if (password !== null) { 
        // ถ้าพิมพ์ผิด (และไม่ได้กด Cancel)
        alert("❌ รหัสผ่านไม่ถูกต้อง! ปฏิเสธการเข้าถึง");
    }
} </script>
</body>
</html>
