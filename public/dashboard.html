<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แดชบอร์ดผู้ดูแลระบบและเจ้าหน้าที่</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen">

    <nav class="bg-white shadow-sm border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 class="text-xl font-bold text-slate-900 flex items-center gap-2 text-center sm:text-left">
                🛠️ Technician Dashboard 
            </h1>
            <div class="flex items-center gap-2 w-full sm:w-auto justify-center sm:justify-end">
                <a href="/index.html" class="text-xs sm:text-sm bg-slate-200 hover:bg-slate-300 px-3 sm:px-4 py-2 rounded-lg transition font-medium text-center">
                    ← กลับหน้าแจ้งซ่อม
                </a>
                <button onclick="checkAdminPassword()" class="text-xs sm:text-sm bg-indigo-600 hover:bg-indigo-700 text-white px-3 sm:px-4 py-2 rounded-lg transition font-medium cursor-pointer flex items-center gap-1 justify-center">
                    👑 เจ้าหน้าที่
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-2 sm:px-6 lg:px-8 py-4 sm:py-8">
        <div class="bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden">
            <div class="p-4 sm:p-6 border-b border-slate-200 bg-slate-50">
                <h2 class="font-bold text-base sm:text-lg text-slate-800">รายการแจ้งซ่อมทั้งหมดในระบบ</h2>
                <p class="text-xs text-slate-500">ช่างสามารถดูรายละเอียด ตรวจสอบความเร่งด่วน และกดยอมรับหรือเปลี่ยนสถานะงานได้ที่นี่</p>
            </div>

            <div class="w-full overflow-x-auto scrollbar-thin">
                <table class="w-full text-left border-collapse min-w-[800px] sm:min-w-full">
                    <thead>
                        <tr class="bg-slate-100 text-slate-600 uppercase text-[11px] sm:text-xs tracking-wider border-b border-slate-200">
                            <th class="py-3 px-4 sm:px-6 font-semibold w-16">ID</th>
                            <th class="py-3 px-4 sm:px-6 font-semibold">ผู้แจ้ง/แผนก/ห้อง</th>
                            <th class="py-3 px-4 sm:px-6 font-semibold">ประเภทปัญหา</th>
                            <th class="py-3 px-4 sm:px-6 font-semibold">รายละเอียดอาการ</th>
                            <th class="py-3 px-4 sm:px-6 font-semibold w-28">ความเร่งด่วน</th>
                            <th class="py-3 px-4 sm:px-6 font-semibold w-32">สถานะงาน</th>
                        </tr>
                    </thead>
                    <tbody id="ticketList" class="divide-y divide-slate-200 text-xs sm:text-sm whitespace-nowrap sm:whitespace-normal">
                        <tr>
                            <td colspan="6" class="text-center py-8 text-slate-400">กำลังโหลดข้อมูลข้อมูล...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // ฟังก์ชันดึงข้อมูลจาก API มาแสดงในตาราง
        async function fetchTickets() {
            try {
                const response = await fetch('/api/repairs');
                const tickets = await response.json();
                
                const tbody = document.getElementById('ticketList');
                tbody.innerHTML = ''; 

                if (tickets.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-slate-400">ยังไม่มีรายการแจ้งซ่อมในระบบ</td></tr>`;
                    return;
                }

                tickets.forEach(ticket => {
                    let priorityColor = 'bg-slate-100 text-slate-700';
                    if (ticket.priority === 'ด่วน') priorityColor = 'bg-amber-100 text-amber-700';
                    if (ticket.priority === 'ด่วนที่สุด') priorityColor = 'bg-red-100 text-red-700 font-bold';

                    let statusStyle = 'bg-slate-100 text-slate-600';
                    if (ticket.status === 'รอดำเนินการ') statusStyle = 'bg-amber-50 text-amber-600 border border-amber-200';
                    if (ticket.status === 'กำลังซ่อม') statusStyle = 'bg-blue-50 text-blue-600 border border-blue-200';
                    if (ticket.status === 'ซ่อมเสร็จสิ้น') statusStyle = 'bg-green-50 text-green-600 border border-green-200';

                    const row = document.createElement('tr');
                    row.className = 'hover:bg-slate-50 transition';
                    row.innerHTML = `
                        <td class="py-3.5 px-4 sm:px-6 font-semibold text-slate-500">#${ticket.id}</td>
                        <td class="py-3.5 px-4 sm:px-6">
                            <div class="font-medium text-slate-900">${ticket.requester_name}</div>
                            <div class="text-xs text-slate-400">แผนก: ${ticket.department}</div>
                            <div class="text-xs text-indigo-500 font-medium mt-0.5">📍 ห้อง: ${ticket.room_name || 'ไม่ได้ระบุ'}</div>
                        </td>
                        <td class="py-3.5 px-4 sm:px-6 text-slate-600">${ticket.problem_type}</td>
                        <td class="py-3.5 px-4 sm:px-6 text-slate-600 max-w-[200px] sm:max-w-xs truncate" title="${ticket.description}">${ticket.description}</td>
                        <td class="py-3.5 px-4 sm:px-6">
                            <span class="px-2.5 py-1 rounded-full text-xs font-medium inline-block ${priorityColor}">${ticket.priority}</span>
                        </td>
                        <td class="py-3.5 px-4 sm:px-6">
                            <span class="px-2.5 py-1.5 rounded-lg text-xs font-semibold inline-block ${statusStyle}">
                                ${ticket.status === 'รอดำเนินการ' ? '⏳ ' : ticket.status === 'กำลังซ่อม' ? '⚙️ ' : '✅ '} ${ticket.status}
                            </span>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function updateStatus(id, newStatus) {
            try {
                const response = await fetch(`/api/repair/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                const result = await response.json();
                if (result.success) {
                    console.log(`เคส #${id} ถูกเปลี่ยนสถานะเป็น: ${newStatus}`);
                } else {
                    alert('ไม่สามารถอัปเดตสถานะได้: ' + result.message);
                }
            } catch (error) {
                console.error(error);
                alert('เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์');
            }
        }

        fetchTickets();
        setInterval(fetchTickets, 10000);
  
        function checkAdminPassword() {
            const password = prompt("🔒 กรุณากรอกรหัสผ่านสำหรับผู้ดูแลระบบ (Admin):");
            if (password === "media@2021") {
                alert("🔓 รหัสผ่านถูกต้อง กำลังนำคุณเข้าสู่หน้าแอดมิน...");
                window.location.href = "/admin.html";
            } else if (password !== null) { 
                alert("❌ รหัสผ่านไม่ถูกต้อง! ปฏิเสธการเข้าถึง");
            }
        } 
    </script>
</body>
</html>
